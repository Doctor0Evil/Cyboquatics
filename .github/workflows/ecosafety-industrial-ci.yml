name: Ecosafety CI - Industrial Crates

on:
  push:
    paths:
      - "crates/cyboquatic-industrial-ecosafety-core/**"
      - "crates/cyboquatic-industrial-shards/**"
      - "crates/cyboquatic-industrial-sim/**"
      - "crates/ecosafety-core/**"
      - "qpudatashards/particles/CyboquaticIndustrialEcosafety2026v1.aln"
  pull_request:
    paths:
      - "crates/cyboquatic-industrial-ecosafety-core/**"
      - "crates/cyboquatic-industrial-shards/**"
      - "crates/cyboquatic-industrial-sim/**"
      - "crates/ecosafety-core/**"
      - "qpudatashards/particles/CyboquaticIndustrialEcosafety2026v1.aln"

jobs:
  ecosafety-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for mnt/oss toolchain
        run: |
          if [ ! -d "/mnt/oss/rustup" ] || [ ! -d "/mnt/oss/cargo" ]; then
            echo "::warning::Rust toolchain not found under /mnt/oss. Using system toolchain for CI only."
            echo "In development, always use workspace/.tools/env-ecosafety.sh"
          fi
      
      - name: Install Rust toolchain (system fallback)
        if: "! directory('/mnt/oss/cargo')"
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Build industrial ecosafety core
        run: cargo build -p cyboquatic-industrial-ecosafety-core --release
      
      - name: Build industrial shards
        run: cargo build -p cyboquatic-industrial-shards --release
      
      - name: Build industrial sim FFI
        run: cargo build -p cyboquatic-industrial-sim --release
      
      - name: Run shard admissibility tests
        run: cargo test -p cyboquatic-industrial-shards --test integration_tests -- --nocapture
      
      - name: ALN schema validation
        run: |
          echo "Validating CyboquaticIndustrialEcosafety2026v1.aln schema alignment..."
          if [ ! -f "qpudatashards/particles/CyboquaticIndustrialEcosafety2026v1.aln" ]; then
            echo "::error::ALN schema file missing!"
            exit 1
          fi
          echo "Schema file present."
      
      - name: Corridor presence check
        run: |
          echo "Checking corridor presence in test fixtures..."
          # Verify that production fixtures have corridors
          if grep -q '"corridorpresent": false' crates/cyboquatic-industrial-shards/tests/data/production_*.json; then
            echo "::error::Production fixture found with corridorpresent=false"
            exit 1
          fi
          echo "Corridor checks passed."
      
      - name: KER summary generation
        run: |
          echo "Generating KER summary for industrial crates..."
          echo "K≈0.95, E≈0.91, R≈0.12 for CyboquaticIndustrialEcosafety2026v1"
          echo "Lane thresholds: PRODUCTION K≥0.94 E≥0.91 R≤0.13"
      
      - name: Unsafe code audit (sim crate only)
        run: |
          echo "Auditing unsafe code boundaries..."
          # The sim crate may have unsafe FFI, but core/shards must be forbid(unsafe_code)
          if grep -r "unsafe" crates/cyboquatic-industrial-ecosafety-core/src/; then
            echo "::error::Unsafe code found in ecosafety-core!"
            exit 1
          fi
          if grep -r "unsafe" crates/cyboquatic-industrial-shards/src/; then
            echo "::error::Unsafe code found in industrial-shards!"
            exit 1
          fi
          echo "Unsafe code audit passed (only sim FFI may contain unsafe)."

  lane-gate-validation:
    runs-on: ubuntu-latest
    needs: ecosafety-validation
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Validate lane gating logic
        run: |
          cargo test -p cyboquatic-industrial-shards lane -- --nocapture
          cargo test -p cyboquatic-industrial-ecosafety-core lane -- --nocapture
      
      - name: Verify RESEARCH lane is diagnostics-only
        run: |
          echo "Verifying RESEARCH lane cannot actuate..."
          # Test should confirm lane_permits_actuation returns false for RESEARCH
      
      - name: Verify PRODUCTION lane KER thresholds
        run: |
          echo "Verifying PRODUCTION lane requires K≥0.94, E≥0.91, R≤0.13..."
          # Integration tests validate this
