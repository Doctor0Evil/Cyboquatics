# Cyboquatics Quantum Circuit Testing Pipeline
# Tests quantum circuits for governance, soul-boundary verification,
# and compliance automation across multiple quantum backends.

name: Quantum Circuit Testing

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/cyboquatics-quantum-circuits/**'
      - 'aln/particles/**quantum**'
  push:
    branches: [main]
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CYBOQUATICS_EVIDENCE_HEX: 0xCQ2026QUANTUM9F8E7D6C
  QUANTUM_SAFETY_THRESHOLD: 0.95

jobs:
  quantum-simulation-tests:
    name: Quantum Simulation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Install quantum simulation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libquantum-dev python3-pip
          pip3 install qiskit qiskit-aer

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build quantum circuits crate
        run: cargo build --package cyboquatics-quantum-circuits --features quantum-simulation

      - name: Run unit tests
        run: |
          cargo test --package cyboquatics-quantum-circuits \
            --features quantum-simulation \
            -- --test-threads=1

      - name: Run integration tests
        run: |
          cargo test --package cyboquatics-quantum-circuits \
            --features quantum-simulation \
            --test integration \
            -- --test-threads=1

      - name: Run quantum circuit benchmarks
        run: |
          cargo bench --package cyboquatics-quantum-circuits \
            --features quantum-simulation \
            --bench quantum_circuit_benchmarks

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quantum-simulation-results
          path: target/criterion/
          retention-days: 30

  quantum-verification-tests:
    name: Quantum Verification Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quantum-simulation-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Run verification tests
        run: |
          cargo test --package cyboquatics-quantum-circuits \
            --features quantum-verification \
            --test verification

      - name: Verify soul-boundary circuits
        run: |
          cargo run --bin quantum-automation -- \
            verify \
            --particles aln/particles/ \
            --guardrail aln/particles/soul.guardrail.spec.v1.aln \
            --output reports/verification-results.json

      - name: Upload verification results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-results
          path: reports/verification-results.json
          retention-days: 90

  quantum-optimization-tests:
    name: Quantum Optimization Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: quantum-verification-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Run optimization tests
        run: |
          cargo test --package cyboquatics-quantum-circuits \
            --features quantum-simulation \
            --test optimization

      - name: Run governance optimization
        run: |
          cargo run --bin quantum-automation -- \
            optimize \
            --objective balance-safety-efficiency \
            --max-risk 0.10 \
            --min-eco 0.70 \
            --output reports/optimization-results.json

      - name: Validate optimization results
        run: |
          cargo run --bin quantum-automation -- \
            verify \
            --particles aln/particles/ \
            --guardrail aln/particles/soul.guardrail.spec.v1.aln

      - name: Upload optimization results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: optimization-results
          path: reports/optimization-results.json
          retention-days: 90

  quantum-security-audit:
    name: Quantum Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quantum-simulation-tests, quantum-verification-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install security audit tools
        run: |
          cargo install cargo-audit
          cargo install cargo-deny

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny
        run: cargo deny check

      - name: Verify quantum encryption
        run: |
          cargo run --bin quantum-automation -- \
            generate-keys \
            --algorithm kyber-1024 \
            --output-dir ./test-keys/

          cargo run --bin quantum-automation -- \
            health-check \
            --endpoint local

      - name: Upload security audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-results
          path: |
            target/security-audit.json
            test-keys/
          retention-days: 365

  publish-quantum-metrics:
    name: Publish Quantum Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quantum-security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Aggregate quantum metrics
        run: |
          mkdir -p metrics/
          python3 scripts/aggregate_quantum_metrics.py \
            --input artifacts/ \
            --output metrics/quantum-metrics.json

      - name: Publish to CyberNet
        env:
          CYBERNET_API_KEY: ${{ secrets.CYBERNET_API_KEY }}
          CYBERNET_NODE_ID: ${{ secrets.CYBERNET_NODE_ID }}
        run: |
          curl -X POST https://api.cybernet.ai/v1/quantum-metrics \
            -H "Authorization: Bearer $CYBERNET_API_KEY" \
            -H "Content-Type: application/json" \
            -d @metrics/quantum-metrics.json

      - name: Update quantum dashboard
        env:
          QUANTUM_DASHBOARD_API: ${{ secrets.QUANTUM_DASHBOARD_API }}
        run: |
          curl -X PUT $QUANTUM_DASHBOARD_API/metrics \
            -H "Content-Type: application/json" \
            -d @metrics/quantum-metrics.json
